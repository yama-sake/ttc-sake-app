# Netlify 設定（SAKE BOOK / 香織さん版 main をそのまま動かす）
#
# このファイルがあると、Netlifyでリポジトリを繋ぐだけで
# ビルド設定・関数・リダイレクトが自動で適用される。
# ※ 香織さんの既存ファイルは一切変更しない。これは新規追加の「配線」だけ。

[build]
  command = "npm run build"   # Viteでクライアントをビルド
  publish = "dist"            # 公開するフォルダ

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# /api/vision を Netlify Function に転送（アプリのコードは変更不要）
[[redirects]]
  from = "/api/vision"
  to = "/.netlify/functions/vision"
  status = 200

# SPAフォールバック（どのパスでも index.html を返す）
# ※ 上の /api/vision ルールより後に置くこと（順番に評価される）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
